<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitStore — Metodos de pago</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

<nav>
    <a href="/" class="logo">🏋️ FitStore</a>
    <div>
        <a href="/static/home.html">Inicio</a>
        <a href="/static/productos.html">Productos</a>
        <a href="/static/admin.html" id="adminLink" style="display:none; color:#e94560">Admin</a>
        <span id="userNav" style="color:white; margin-left:1.5rem"></span>
        <button id="logoutBtn" onclick="cerrarSesion()" style="display:none; margin-left:1rem; background:#e94560; color:white; border:none; padding:0.3rem 0.8rem; border-radius:4px; cursor:pointer">Cerrar sesión</button>
    </div>
</nav>

<div class="hero">
    <div class="col-12 btn text-center">
        <button type="button" class="btn btn-danger" data-bs-toggle="collapse" data-bs-target="#collapseExample" aria-expanded="false" aria-controls="collapseExample">
            Registrar una nueva tarjeta
        </button>
    </div>

    <div class="collapse col-12" id="collapseExample">
        <div class="card card-body hero">
            <div class="form-card" id="register-target">
                <h2>Registra tus tarjetas</h2>
            
                <!-- div class="alert error-alert" id="alertLoginError"></div> -->
            
                <div class="form-group">
                    <label>Tipo de tarjeta:</label>
                    <select name="tipo-tarjeta" id="tipo-tarjeta-select">
                        <option value="db">Debito</option>
                        <option value="cd">Credito</option>
                    </select>
                </div>
            
                <div class="form-group">
                    <label>Número de tarjeta:</label>
                    <input type="text" id="numero-tarjeta" placeholder="xxxx-xxxx-xxxx-xxxx" >
                </div>
            
                <div class="form-group">
                    <label>Fecha Expiración:</label>
                    <input type="text" id="fecha-expiracion" placeholder="MM/YY" 
                        maxlength="5" 
                        inputmode="numeric"
                    >
                </div>
            
                <div class="form-group">
                    <label>Código de seguridad:</label>
                    <input type="text" id="codigo-seguridad" placeholder="XXX" maxlength="4" inputmode="numeric">
                </div>

                <div class="form-group">
                    <label>Saldo inicial ($):</label>
                    <input type="number" id="saldo" placeholder="0.00" min="0" step="0.01">
                </div>
            
                <button type="button" class="btn btn-success" onclick="event.preventDefault(); registrarTarjeta();">Registrar tarjeta</button>
            </div>    
        </div>
    </div>
    
    <div class="col-12" id="mis-tarjetas" style="margin-top: 2rem;">
        <h3>Mis tarjetas registradas</h3>
        <div id="tarjetas-list"></div>
    </div>
    
</div>

<script src="/static/app.js"></script>
<script src="/static/tarjeta.js" defer></script>
<script>
// Verificar después de que todos los scripts se carguen
window.addEventListener('load', function() {
    console.log("📋 Estado de scripts:");
    console.log("✅ API disponible:", typeof API !== 'undefined');
    console.log("✅ registrarTarjeta disponible:", typeof registrarTarjeta === 'function');
    console.log("✅ cargarTarjetas disponible:", typeof cargarTarjetas === 'function');
    console.log("✅ validarDatos disponible:", typeof validarDatos === 'function');
    
    if (typeof registrarTarjeta !== 'function') {
        console.error("❌ Error: registrarTarjeta no está disponible!");
        alert("Error crítico: Las funciones no se cargaron. Recarga la página.");
    } else {
        console.log("🎉 ¡Todo listo! Las funciones están disponibles.");
    }
});
</script>
</body>
</html>
