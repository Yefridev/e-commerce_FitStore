<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitStore — Admin</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>

<nav>
    <a href="/" class="logo">🏋️ FitStore</a>
    <div>
        <a href="/">Inicio</a>
        <a href="/static/productos.html">Productos</a>
        <a href="/static/admin.html" style="color:#e94560">Admin</a>
        <span id="userNav" style="color:white; margin-left:1.5rem"></span>
        <button id="logoutBtn" onclick="cerrarSesion()" style="display:none; margin-left:1rem; background:#e94560; color:white; border:none; padding:0.3rem 0.8rem; border-radius:4px; cursor:pointer">Cerrar sesión</button>
    </div>
</nav>

<div class="container">
    <h2 style="margin-bottom:0.5rem">Panel de Administración</h2>
    <p style="color:#888; margin-bottom:2rem">Gestiona productos y categorías</p>

    <div class="alert error-alert" id="alertError" style="display:none"></div>
    <div class="alert success" id="alertSuccess" style="display:none">✅ Operación exitosa</div>

    <div class="form-card" style="margin-bottom: 2rem;">
        <h3>Agregar Producto</h3>
        <div class="form-group">
            <label>Nombre del producto</label>
            <input type="text" id="nombre" placeholder="Ej: Proteína Whey">
        </div>

        <div class="form-group">
            <label>Precio ($)</label>
            <input type="number" id="precio" placeholder="0.00" step="0.01" min="0">
        </div>

        <div class="form-group">
            <label>Descripción</label>
            <textarea id="descripcion" placeholder="Descripción del producto" rows="3"></textarea>
        </div>

        <div class="form-group">
            <label>Stock</label>
            <input type="number" id="stock" placeholder="0" min="0" value="0">
        </div>

        <div class="form-group">
            <label>URL de imagen (opcional)</label>
            <input type="text" id="imagen" placeholder="https://ejemplo.com/imagen.jpg">
        </div>

        <div class="form-group">
            <label>Categoría</label>
            <select id="categoria_id">
                <option value="">Sin categoría</option>
            </select>
        </div>

        <button class="btn" onclick="crearProducto()">Agregar Producto</button>
    </div>

    <div class="form-card">
        <h3>Agregar Categoría</h3>
        <div class="form-group">
            <label>Nombre de la categoría</label>
            <input type="text" id="catNombre" placeholder="Ej: Suplementos">
        </div>

        <div class="form-group">
            <label>Descripción (opcional)</label>
            <input type="text" id="catDescripcion" placeholder="Descripción">
        </div>

        <button class="btn" onclick="crearCategoria()">Agregar Categoría</button>
    </div>

    <div class="form-card" style="margin-top:2rem">
        <h3>Lista de Categorías</h3>
        <div id="categoriasList"></div>
    </div>

    <div class="form-card" style="margin-top:2rem">
        <h3>Lista de Productos</h3>
        <div id="productosList"></div>
    </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
